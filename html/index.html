<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem vindo ao meu Portifólio</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #e2e8f0;
            --accent: #38bdf8;
            --accent-dark: #0ea5e9;
            --shadow: 0 25px 60px rgba(15, 23, 42, 0.35);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, rgba(56, 189, 248, 0.15), transparent 35%),
                        linear-gradient(180deg, #020617 0%, #0b1120 100%);
            color: var(--text);
            min-height: 100vh;
        }

        .page {
            max-width: 1180px;
            margin: 0 auto;
            padding: 32px 24px 64px;
        }

        header {
            display: grid;
            gap: 24px;
            padding: 48px 0 32px;
        }

        .intro {
            display: grid;
            gap: 18px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(56, 189, 248, 0.12);
            color: var(--accent);
            font-weight: 600;
            width: fit-content;
        }

        h1 {
            font-size: clamp(2.5rem, 4vw, 4rem);
            line-height: 1.02;
        }

        p.lead {
            max-width: 720px;
            font-size: 1.05rem;
            color: #cbd5e1;
            line-height: 1.75;
        }

        .hero-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 28px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 22px;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #06b6d4);
            color: #020617;
        }

        .btn-secondary {
            background: rgba(148, 163, 184, 0.16);
            color: var(--text);
            border: 1px solid rgba(148, 163, 184, 0.18);
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .projects-section {
            margin-top: 48px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 28px;
        }

        .section-header h2 {
            font-size: 1.75rem;
        }

        .project-grid {
            display: grid;
            gap: 24px;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        }

        .project-card {
            background: rgba(15, 23, 42, 0.92);
            border: 1px solid rgba(148, 163, 184, 0.08);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
        }

        .project-card video,
        .project-card img {
            width: 100%;
            height: 210px;
            object-fit: cover;
            background: #020617;
        }

        .project-content {
            padding: 22px;
            display: grid;
            gap: 14px;
        }

        .project-title {
            font-size: 1.15rem;
            font-weight: 700;
        }

        .project-description {
            font-size: 0.98rem;
            color: #cbd5e1;
            line-height: 1.6;
        }

        .project-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            font-size: 0.8rem;
            color: #94a3b8;
            background: rgba(148, 163, 184, 0.12);
            padding: 8px 10px;
            border-radius: 999px;
        }

        .project-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .project-link {
            color: var(--accent);
            font-weight: 600;
            text-decoration: none;
        }

        .project-link:hover {
            color: var(--accent-dark);
        }

        .pill {
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(56, 189, 248, 0.12);
            color: #bae6fd;
            font-size: 0.85rem;
            font-weight: 600;
        }
/*CSS do footter*/
        .footer-brands {
            margin-top: 48px;
            padding: 32px 26px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.08);
            border-radius: 28px;
            box-shadow: var(--shadow);
        }

        .footer-brands h3 {
            margin-bottom: 20px;
            font-size: 1.4rem;
        }

        .brands-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
        }

        .brand-card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 18px 20px;
            border-radius: 22px;
            background: linear-gradient(135deg, rgba(7, 60, 20, 0.95), rgba(14, 107, 45, 0.85));
            border: 1px solid rgba(103, 194, 58, 0.3);
            box-shadow: 0 18px 36px rgba(0, 0, 0, 0.25);
            transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
        }

        .brand-card:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, rgba(14, 107, 45, 1), rgba(7, 60, 20, 0.95));
            border-color: rgba(103, 194, 58, 0.55);
        }

        .brand-logo {
            width: 56px;
            height: 56px;
            border-radius: 18px;
            display: grid;
            place-items: center;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow: hidden;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        }

        .brand-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .brand-name {
            font-weight: 700;
            color: #ffffff;
            line-height: 1.2;
            text-transform: uppercase;
            font-size: 0.98rem;
            letter-spacing: 0.04em;
        }
/*CSS do footter-->*/
        @media (max-width: 640px) {
            .page {
                padding: 24px 16px 40px;
            }

            header {
                padding-top: 32px;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <header>
            <div class="intro">
                <span class="badge">Meus projetos</span>
                <h1>Projetos realizados
                </h1>
                <p class="lead">Aqui você vai encontrar meus projetos mais recentes e os tipos de vídeo que edito</p>
                <div class="hero-actions">
                    <button class="btn btn-primary" onclick="window.location.href='page2.html'">Ver mais projetos</button>
                    <button class="btn btn-secondary" onclick="alert('Em breve, aqui você poderá entrar em contato!')">Fale comigo</button>
                </div>
            </div>
        </header>

        <section class="projects-section" id="projects">
            <div class="section-header">
                <div>
                    <h2>Projetos em Destaque</h2>
                    <p style="color:#94a3b8; margin-top:6px;">Aqui estão os meus maiores trabalhos até o momento.</p>
                </div>
                <span class="pill">Atualizado recentemente</span>
            </div>

            <div class="project-grid" id="projectGrid">
                <!-- Cards serão inseridos aqui dinamicamente -->
            </div>
        </section>
<!--HTML do footter-->
        <section class="footer-brands">
            <h3>Marcas com as quais trabalho</h3>
            <div class="brands-grid">
                <div class="brand-card">
                    <span class="brand-logo">
                        <img src="../Imagens/OTZ_Logo.jpg" alt="Logo OTZ Suplementos">
                    </span>
                    <span class="brand-name">OTZ Suplementos</span>
                </div>
                <!--
                <div class="brand-card">
                    <span class="brand-logo">Ae</span>
                    <span class="brand-name">Adobe After Effects</span>
                 </div>
                <div class="brand-card">
                    <span class="brand-logo">DR</span>
                    <span class="brand-name">DaVinci Resolve</span>
                </div>
                <div class="brand-card">
                    <span class="brand-logo">FC</span>
                    <span class="brand-name">Final Cut Pro</span>
                </div>
                <div class="brand-card">
                    <span class="brand-logo">YT</span>
                    <span class="brand-name">YouTube</span>
                </div> -->
            </div>
        </section>
    </main>
<!--HTML do footter-->
    <script>
        const projects = [
            {
                title: 'Edição Viral',
                description: 'Vídeo demonstrativo de uma landing page responsiva com animações, design moderno e call to action claros.',
                video: 'https://www.w3schools.com/html/mov_bbb.mp4',
                poster: 'https://images.pexels.com/photos/1181671/pexels-photo-1181671.jpeg?auto=compress&cs=tinysrgb&w=800',
                tags: ['TikTok', 'YouTube'],
                link: '#'
            },
            {
                title: 'Vídeo para vendas',
                description: 'Demonstração de fluxo de usuário, animações e integração com APIs para criar e organizar tarefas.',
                video: 'https://www.w3schools.com/html/movie.mp4',
                poster: 'https://images.pexels.com/photos/1181674/pexels-photo-1181674.jpeg?auto=compress&cs=tinysrgb&w=800',
                tags: ['Serviços', 'Produtos'],
                link: '#'
            },
        ];

        const grid = document.getElementById('projectGrid');

        projects.forEach(project => {
            const card = document.createElement('article');
            card.className = 'project-card';

            card.innerHTML = `
                <video autoplay muted loop playsinline poster="${project.poster}">
                    <source src="${project.video}" type="video/mp4">
                    Seu navegador não suporta vídeo.
                </video>
                <div class="project-content">
                    <div>
                        <h3 class="project-title">${project.title}</h3>
                        <p class="project-description">${project.description}</p>
                    </div>
                    <div class="project-tags">
                        ${project.tags ? project.tags.map(tag => `<span class="tag">${tag}</span>`).join('') : ''}
                    </div>
                    <div class="project-footer">
                        <a class="project-link" href="${project.link}">Ver projeto</a>
                        <span class="pill">Vídeo</span>
                    </div>
                </div>
            `;

            grid.appendChild(card);
        });
    </script>
</body>
</html>
