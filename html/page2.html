<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Projetos</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #e2e8f0;
            --accent: #38bdf8;
            --accent-dark: #0ea5e9;
            --shadow: 0 25px 60px rgba(15, 23, 42, 0.35);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, rgba(56, 189, 248, 0.15), transparent 35%),
                linear-gradient(180deg, #020617 0%, #0b1120 100%);
            color: var(--text);
            min-height: 100vh;
        }

        .page {
            max-width: 1180px;
            margin: 0 auto;
            padding: 32px 24px 64px;
        }

        header {
            display: grid;
            gap: 24px;
            padding: 48px 0 32px;
        }

        .intro {
            display: grid;
            gap: 18px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(56, 189, 248, 0.12);
            color: var(--accent);
            font-weight: 600;
            width: fit-content;
        }

        h1 {
            font-size: clamp(2.5rem, 4vw, 4rem);
            line-height: 1.02;
        }

        p.lead {
            max-width: 720px;
            font-size: 1.05rem;
            color: #cbd5e1;
            line-height: 1.75;
        }

        .hero-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 28px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 22px;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #06b6d4);
            color: #020617;
        }

        .btn-secondary {
            background: rgba(148, 163, 184, 0.16);
            color: var(--text);
            border: 1px solid rgba(148, 163, 184, 0.18);
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .projects-section {
            margin-top: 48px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 28px;
        }

        .section-header h2 {
            font-size: 1.75rem;
        }

        .project-grid {
            display: grid;
            gap: 24px;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        }

        .project-card {
            background: rgba(15, 23, 42, 0.92);
            border: 1px solid rgba(148, 163, 184, 0.08);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
        }

        .project-card video,
        .project-card img {
            width: 100%;
            height: 210px;
            object-fit: cover;
            background: #020617;
        }

        .project-content {
            padding: 22px;
            display: grid;
            gap: 14px;
        }

        .project-title {
            font-size: 1.15rem;
            font-weight: 700;
        }

        .project-description {
            font-size: 0.98rem;
            color: #cbd5e1;
            line-height: 1.6;
        }

        .project-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            font-size: 0.8rem;
            color: #94a3b8;
            background: rgba(148, 163, 184, 0.12);
            padding: 8px 10px;
            border-radius: 999px;
        }

        .project-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .project-link {
            color: var(--accent);
            font-weight: 600;
            text-decoration: none;
        }

        .project-link:hover {
            color: var(--accent-dark);
        }

        .pill {
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(56, 189, 248, 0.12);
            color: #bae6fd;
            font-size: 0.85rem;
            font-weight: 600;
        }

        @media (max-width: 640px) {
            .page {
                padding: 24px 16px 40px;
            }


            header {
                padding-top: 32px;
            }

            .cases-container {
                display: flex;
                gap: 20px;
                flex-wrap: wrap;
                justify-content: center;
                margin: 20px 0;
            }

            .case-div {
                flex: 1 1 300px;
                max-width: 400px;
                text-align: center;
            }

            .case-div video {
                width: 100%;
                height: auto;
                border-radius: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="cases-container">
        <div class="case-div">
            <video src="demo1.mp4" controls></video>
            <p>Case de Sucesso 1</p>
        </div>
        <div class="case-div">
            <video src="demo2.mp4" controls></video>
            <p>Case de Sucesso 2</p>
        </div>
        <div class="case-div">
            <video src="demo3.mp4" controls></video>
            <p>Case de Sucesso 3</p>
        </div>
    </div>

    <h2>Vídeos que editei</h2>

</body>

</html>
